<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprachlabor — 90 Günlük Almanca</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --base:#16201f; --surface:#1e2b29; --surface2:#243531;
  --ink:#ede8dc; --muted:#8a9a96; --line:#33433f;
  --amber:#e8a33d; --mint:#6fb3a8; --clay:#d9694a; --green:#7ea862;
  --display:'Space Grotesk',sans-serif; --serif:'Newsreader',Georgia,serif; --mono:'Space Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--base);color:var(--ink);font-family:var(--display);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;padding-bottom:90px}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
.wrap{max-width:620px;margin:0 auto;padding:0 18px}

/* header */
header{padding:22px 0 14px;border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:baseline;justify-content:space-between}
.logo{font-weight:700;font-size:19px;letter-spacing:-.02em}
.logo span{color:var(--amber)}
.daychip{font-family:var(--mono);font-size:12px;color:var(--muted)}
.daychip b{color:var(--mint)}
.streak{font-family:var(--mono);font-size:13px;color:var(--amber)}

/* 90-tick signature strip */
.track{display:grid;grid-template-columns:repeat(45,1fr);gap:2px;margin-top:14px}
.tick{height:14px;background:var(--surface);border-radius:1px}
.tick.done{background:var(--mint)}
.tick.today{background:var(--amber);box-shadow:0 0 0 1px var(--amber)}
.tracklabels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:5px}

/* sections */
main{padding-top:20px}
.view{display:none}.view.active{display:block}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
h1{font-size:26px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px}
h2{font-size:17px;font-weight:600;margin:22px 0 10px}
.sub{color:var(--muted);font-size:14px}

.card{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:18px;margin-bottom:14px}
.card.tap{cursor:pointer;transition:border-color .15s,transform .1s}
.card.tap:active{transform:scale(.99)}

/* today plan rows */
.planrow{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--line)}
.planrow:last-child{border-bottom:none}
.dot{width:34px;height:34px;flex:0 0 34px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:17px}
.planrow .t{font-weight:600;font-size:15px}
.planrow .d{font-size:13px;color:var(--muted)}
.planrow .meta{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--amber)}

.daybadge{display:inline-block;font-family:var(--mono);font-size:11px;padding:4px 9px;border:1px solid var(--line);border-radius:20px;color:var(--mint);margin-bottom:14px}

/* buttons */
.btn{font-family:var(--display);font-weight:600;font-size:15px;border:none;border-radius:9px;padding:13px 18px;cursor:pointer;width:100%;transition:filter .15s}
.btn:active{filter:brightness(.9)}
.btn-pri{background:var(--amber);color:#1a1410}
.btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
.btn-mint{background:var(--mint);color:#0e1a18}
.btnrow{display:flex;gap:9px}.btnrow .btn{width:auto;flex:1}

/* flashcard */
.fc{min-height:230px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px 20px;position:relative}
.fc .art{font-family:var(--mono);font-size:13px;color:var(--amber);margin-bottom:8px}
.fc .de{font-family:var(--serif);font-size:36px;font-weight:500;line-height:1.15}
.fc .tap-hint{position:absolute;bottom:14px;font-size:12px;color:var(--muted);font-family:var(--mono)}
.fc .tr{font-size:22px;font-weight:600;margin-bottom:14px}
.fc .ex{font-family:var(--serif);font-size:18px;color:var(--ink);font-style:italic}
.fc .extr{font-size:14px;color:var(--muted);margin-top:6px}
.rate{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.rate .btn{font-size:14px;padding:14px 6px}
.r-again{background:var(--clay);color:#1a0f0c}
.r-good{background:var(--surface2);color:var(--ink);border:1px solid var(--line)}
.r-easy{background:var(--mint);color:#0e1a18}
.rate .iv{display:block;font-family:var(--mono);font-size:10px;opacity:.7;margin-top:2px;font-weight:400}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .big{font-size:40px;margin-bottom:10px}

/* grammar */
.lesson p{margin-bottom:11px;font-size:15px}
.lesson .conj{width:100%;border-collapse:collapse;margin:12px 0;font-family:var(--mono);font-size:14px}
.lesson .conj td{padding:8px 10px;border-bottom:1px solid var(--line)}
.lesson .conj td:first-child{color:var(--mint)}
.lesson .conj td:last-child{color:var(--ink);font-weight:700}
.tip{background:var(--surface2);border-left:3px solid var(--amber);padding:11px 14px;border-radius:0 8px 8px 0;font-size:14px;margin:12px 0}
.feyn{background:var(--surface);border:1px dashed var(--mint);border-radius:10px;padding:16px;margin-top:14px}
.feyn .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--mint);text-transform:uppercase;margin-bottom:8px}
.feyn ul{list-style:none}
.feyn li{padding:9px 0 9px 26px;position:relative;font-size:15px;border-bottom:1px solid var(--line)}
.feyn li:last-child{border:none}
.feyn li::before{content:"›";position:absolute;left:6px;color:var(--mint);font-weight:700}

/* quiz */
.q{font-size:18px;font-weight:600;margin-bottom:14px}
.q .de{font-family:var(--serif);font-style:italic;color:var(--amber)}
.opt{display:block;width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:14px 16px;margin-bottom:9px;font-size:15px;font-family:var(--display);cursor:pointer;transition:border-color .15s}
.opt:hover{border-color:var(--muted)}
.opt.correct{border-color:var(--green);background:rgba(126,168,98,.12)}
.opt.wrong{border-color:var(--clay);background:rgba(217,105,74,.12)}
.opt:disabled{cursor:default}
.qprog{font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:10px}
.scorebox{text-align:center;padding:30px}
.scorebox .n{font-family:var(--mono);font-size:48px;color:var(--mint)}

/* progress stats */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:16px}
.stat .n{font-family:var(--mono);font-size:30px;color:var(--amber);line-height:1}
.stat .l{font-size:12px;color:var(--muted);margin-top:6px}

/* listening: custom player + chat bubbles */
.player{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin:8px 0 20px}
.playbtn{flex:0 0 auto;width:46px;height:46px;border-radius:50%;background:var(--amber);color:#1a1410;border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.playbtn:active{filter:brightness(.92)}
.ptrack{flex:1;height:7px;background:var(--surface2);border-radius:4px;cursor:pointer;position:relative;overflow:hidden}
.pfill{position:absolute;left:0;top:0;height:100%;width:0;background:var(--mint);border-radius:4px}
.ptime{font-family:var(--mono);font-size:12px;color:var(--muted);flex:0 0 auto;min-width:34px;text-align:right}
.chat{display:flex;flex-direction:column;gap:8px}
.brow{display:flex;flex-direction:column;max-width:86%}
.brow.them{align-self:flex-start;align-items:flex-start}
.brow.me{align-self:flex-end;align-items:flex-end}
.bub{font-family:var(--serif);font-size:17px;line-height:1.35;padding:11px 14px;border-radius:15px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.brow.them .bub{background:var(--surface);border:1px solid var(--line);border-bottom-left-radius:4px}
.brow.me .bub{background:var(--surface2);border:1px solid var(--line);border-bottom-right-radius:4px}
.bub .who{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mint);margin-bottom:3px}
.brow.me .bub .who{color:var(--amber)}
.bub .taphint{display:block;font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:5px;opacity:.55}
.btr{margin-top:6px;font-family:var(--display);font-size:14px;color:var(--ink);padding:9px 13px;border-radius:13px;border:1px dashed var(--mint);background:transparent;animation:btrpop .18s ease}
@keyframes btrpop{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}

/* card mode toggle + word list */
.seg{display:flex;gap:8px;margin:14px 0 6px}
.segbtn{flex:1;background:var(--surface);border:1px solid var(--line);color:var(--muted);font-family:var(--display);font-weight:600;font-size:13px;padding:11px 8px;border-radius:8px;cursor:pointer}
.segbtn.on{background:var(--surface2);color:var(--amber);border-color:var(--amber)}
.wlday{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--mint);text-transform:uppercase;margin:18px 0 4px}
.wlrow{display:flex;align-items:baseline;gap:10px;padding:11px 2px;border-bottom:1px solid var(--line)}
.wlde{font-family:var(--serif);font-size:17px;flex:0 0 46%}
.wlart{color:var(--amber);font-size:13px}
.wltr{flex:1;color:var(--muted);font-size:14px}
.wlok{color:var(--green);font-size:14px;flex:0 0 auto}

/* grammar topic index */
.topicrow{display:flex;align-items:center;gap:14px;padding:16px 16px}
.topicrow .num{font-family:var(--mono);font-size:11px;color:var(--mint);flex:0 0 auto}
.topicrow .ttl{flex:1;font-weight:600;font-size:15px}
.topicrow .mk{font-size:18px;color:var(--muted)}
.topicrow .mk.done{color:var(--green)}
.backbtn{background:none;border:none;color:var(--mint);font-family:var(--display);font-size:14px;font-weight:600;cursor:pointer;padding:6px 0;margin-bottom:10px}

/* nav */
nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--line);display:flex;z-index:10}
nav button{flex:1;background:none;border:none;color:var(--muted);padding:11px 4px 13px;cursor:pointer;font-family:var(--display);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px}
nav button .ic{font-size:19px;line-height:1}
nav button.active{color:var(--amber)}
nav button .badge{position:absolute;transform:translate(14px,-4px);background:var(--clay);color:#1a0f0c;font-family:var(--mono);font-size:9px;font-weight:700;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--mint);color:#0e1a18;padding:11px 18px;border-radius:9px;font-weight:600;font-size:14px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:20}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo">Sprach<span>labor</span></div>
      <div style="display:flex;align-items:center;gap:14px"><button id="muteBtn" aria-label="Sesi aç/kapat" style="background:none;border:none;font-size:17px;cursor:pointer;padding:2px;line-height:1">🔊</button><div class="streak" id="streak">🔥 0</div></div>
    </div>
    <div class="track" id="track"></div>
    <div class="tracklabels"><span>Gün 1</span><span id="dayNow">Bugün: Gün 1</span><span>Gün 90</span></div>
  </header>

  <main>
    <!-- TODAY -->
    <section class="view active" id="v-today">
      <div class="eyebrow" id="todayWeekday">PAZARTESİ · GRAMER GÜNÜ</div>
      <h1 id="todayTitle">Bugünün planı</h1>
      <p class="sub" id="todaySub">Üç teknik, her gün: aralıklı tekrar, aktif hatırlama, Feynman.</p>
      <div class="card" style="margin-top:16px">
        <div id="plan"></div>
      </div>
      
      <button class="btn btn-mint" id="completeDay">Günü tamamla ✓</button>
      <p class="sub" style="text-align:center;margin-top:10px;font-size:13px" id="completeNote"></p>
    </section>

    <!-- CARDS / SRS -->
    <section class="view" id="v-cards">
      <div class="eyebrow">ARALIKLI TEKRAR</div>
      <h1>Kartlar</h1>
      <div id="cardArea"></div>
    </section>

    <!-- GRAMMAR + FEYNMAN -->
    <section class="view" id="v-gram">
      <div class="eyebrow">GRAMER · FEYNMAN</div>
      <h1 id="gramDay">Gramer</h1>
      <div id="gramArea"></div>
    </section>

    <!-- QUIZ -->
    <section class="view" id="v-quiz">
      <div class="eyebrow">AKTİF HATIRLAMA</div>
      <h1>Quiz</h1>
      <div id="quizArea"></div>
    </section>

    <!-- PROGRESS -->
    <section class="view" id="v-prog">
      <div class="eyebrow">İLERLEME</div>
      <h1>Durum</h1>
      <div class="stats" id="statsArea" style="margin-top:16px"></div>
      <div class="card">
        <h2 style="margin-top:0">Önümüzdeki 7 gün — tekrar yükü</h2>
        <div id="forecast"></div>
      </div>
      <button class="btn btn-ghost" id="resetBtn" style="margin-top:6px">İlerlemeyi sıfırla</button>
    </section>

    <!-- LISTENING -->
    <section class="view" id="v-listen">
      <div class="eyebrow">DİNLEME · DİYALOG</div>
      <h1 id="listenTitle">Dinleme</h1>
      <div id="listenArea"></div>
    </section>
  </main>
</div>

<nav>
  <button class="active" data-v="today"><span class="ic">◧</span>Bugün</button>
  <button data-v="cards"><span class="ic">▤</span><span id="navBadge"></span>Kartlar</button>
  <button data-v="gram"><span class="ic">✎</span>Gramer</button>
  <button data-v="listen"><span class="ic">♫</span>Dinleme</button>
  <button data-v="quiz"><span class="ic">?</span>Quiz</button>
  <button data-v="prog"><span class="ic">◔</span>İlerleme</button>
</nav>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   MÜFREDAT — her güne yeni blok ekleyerek ilerle.
   Bir gün eklemek için CURRICULUM nesnesine yeni numara ekle.
   Şablon en altta (DAY TEMPLATE) yorum olarak var.
   ============================================================ */
const CURRICULUM = {
  1: {
    grammar: {
      title: "Kişi zamirleri + “sein” (olmak)",
      html: `
        <p>Almancada cümlenin iskeleti <b>özne (zamir) + fiil</b>. İlk öğrenilmesi gereken fiil <b>sein</b> = “olmak / -dir”. Düzensizdir, bu yüzden ezberlenir.</p>
        <table class="conj">
          <tr><td>ich</td><td>bin</td><td>ben -im</td></tr>
          <tr><td>du</td><td>bist</td><td>sen -sin</td></tr>
          <tr><td>er / sie / es</td><td>ist</td><td>o -dir</td></tr>
          <tr><td>wir</td><td>sind</td><td>biz -iz</td></tr>
          <tr><td>ihr</td><td>seid</td><td>siz -siniz</td></tr>
          <tr><td>sie / Sie</td><td>sind</td><td>onlar / siz(resmi)</td></tr>
        </table>
        <p>Örnek: <i>Ich <b>bin</b> Tahir. Du <b>bist</b> hier. Das <b>ist</b> gut.</i></p>
        <div class="tip">İpucu: <b>du</b> = senli (samimi), <b>Sie</b> (büyük S) = sizli/resmi. İkisini karıştırma — kibarlık burada başlıyor.</div>`,
      feynman: [
        "“sein” fiilinin 6 çekimini ezberden, zamirleriyle birlikte sesli söyle (ich bin… du bist…).",
        "Birine du ile Sie arasındaki farkı tek cümlede anlat. Ne zaman hangisi?",
        "Kendin hakkında 3 cümle kur: Ich bin … / Ich bin … / Das ist …"
      ]
    },
    vocab: [
      {de:"hallo", art:"", tr:"merhaba", ex:"Hallo, wie geht’s?", extr:"Merhaba, nasılsın?"},
      {de:"Tag", art:"der", tr:"gün", ex:"Guten Tag!", extr:"İyi günler!"},
      {de:"danke", art:"", tr:"teşekkürler", ex:"Danke schön!", extr:"Çok teşekkürler!"},
      {de:"ja / nein", art:"", tr:"evet / hayır", ex:"Ja, das ist gut.", extr:"Evet, bu iyi."},
      {de:"Name", art:"der", tr:"isim, ad", ex:"Mein Name ist Tahir.", extr:"Adım Tahir."},
      {de:"ich", art:"", tr:"ben", ex:"Ich bin Programmierer.", extr:"Ben programcıyım."},
      {de:"du", art:"", tr:"sen", ex:"Du bist nett.", extr:"Sen naziksin."},
      {de:"Wasser", art:"das", tr:"su", ex:"Das Wasser ist kalt.", extr:"Su soğuk."},
      {de:"Haus", art:"das", tr:"ev", ex:"Das Haus ist groß.", extr:"Ev büyük."},
      {de:"Frau", art:"die", tr:"kadın / hanım", ex:"Die Frau ist hier.", extr:"Kadın burada."},
      {de:"Mann", art:"der", tr:"adam / erkek", ex:"Der Mann ist müde.", extr:"Adam yorgun."},
      {de:"gut", art:"", tr:"iyi", ex:"Mir geht es gut.", extr:"İyiyim."},
      {de:"und", art:"", tr:"ve", ex:"Du und ich.", extr:"Sen ve ben."},
      {de:"nicht", art:"", tr:"değil (olumsuzluk)", ex:"Das ist nicht gut.", extr:"Bu iyi değil."}
    ],
    quiz: [
      {q:"“Ich ___ Tahir.” boşluğa ne gelir?", opts:["bin","bist","ist","sind"], a:0},
      {q:"“Haus” kelimesinin artikeli hangisi?", opts:["der","die","das"], a:2},
      {q:"“Teşekkürler” Almanca nasıl denir?", opts:["bitte","danke","hallo","gut"], a:1},
      {q:"“Du ___ nett.” boşluğa ne gelir?", opts:["bin","ist","bist","seid"], a:2},
      {q:"Resmi “siz” için hangi zamir kullanılır?", opts:["du","ihr","Sie","wir"], a:2},
      {q:"“Frau” kelimesinin artikeli?", opts:["der","die","das"], a:1},
      {q:"“nicht” ne anlama gelir?", opts:["ve","değil","iyi","ev"], a:1},

let _ac=null; const _buf={}; let _audioReady=false;
function _b64ToBuf(uri){ const b=atob(uri.split(',')[1]); const arr=new Uint8Array(b.length); for(let i=0;i<b.length;i++)arr[i]=b.charCodeAt(i); return arr.buffer; }
function initAudio(){
  if(_ac)return;
  const AC=window.AudioContext||window.webkitAudioContext; if(!AC)return;
  _ac=new AC();
  Object.keys(SFX).forEach(n=>{ try{ _ac.decodeAudioData(_b64ToBuf(SFX[n]), buf=>{_buf[n]=buf;}, ()=>{}); }catch(e){} });
  _audioReady=true;
}
function playSound(name){
  if(typeof S!=='undefined'&&S&&S.muted)return;
  if(!_ac){ try{const a=new Audio(SFX[name]);a.play().catch(()=>{});}catch(e){} return; }
  if(_ac.state==='suspended')_ac.resume();
  const buf=_buf[name]; if(!buf)return;
  try{ const src=_ac.createBufferSource(); src.buffer=buf; src.connect(_ac.destination); src.start(0);}catch(e){}
}
function _unlockAudio(){ initAudio(); if(_ac&&_ac.state==='suspended')_ac.resume();
  document.removeEventListener('touchend',_unlockAudio); document.removeEventListener('click',_unlockAudio); }
document.addEventListener('touchend',_unlockAudio,{passive:true});
document.addEventListener('click',_unlockAudio);
function dataURItoBlobURL(uri){ try{ const c=uri.indexOf(','); const meta=uri.slice(0,c), b64=uri.slice(c+1); const mime=(meta.match(/:(.*?);/)||[])[1]||'audio/mpeg'; const bin=atob(b64); const arr=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i); return URL.createObjectURL(new Blob([arr],{type:mime})); }catch(e){ return uri; } }
function renderMute(){ const b=document.getElementById('muteBtn'); if(!b)return; b.textContent=S.muted?'🔇':'🔊'; b.style.opacity=S.muted?'.45':'1'; }

const KEY="sprachlabor_v1";
let S;
function today(){return new Date().toISOString().slice(0,10);}
function load(){
  try{S=JSON.parse(localStorage.getItem(KEY));}catch(e){S=null;}
  if(!S){S={start:today(),currentDay:1,cards:{},done:[],gramDone:[],quizDone:{},lastActive:null,streak:0,muted:false};}
  if(!S.cards)S.cards={};
  if(S.muted===undefined)S.muted=false;
  save();
}
function save(){localStorage.setItem(KEY,JSON.stringify(S));}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}

/* streak: bump on activity */
function bumpStreak(){
  const t=today();
  if(S.lastActive===t)return;
  if(S.lastActive && daysBetween(S.lastActive,t)===1) S.streak++;
  else if(S.lastActive!==t) S.streak = (S.lastActive&&daysBetween(S.lastActive,t)===0)?S.streak:1;
  S.lastActive=t; save();
}

/* ---------- SRS (SM-2 lite) ---------- */
function cardId(day,i){return day+"-"+i;}
function ensureCards(){
  for(let d=1; d<=S.currentDay; d++){
    if(!CURRICULUM[d])continue;
    CURRICULUM[d].vocab.forEach((v,i)=>{
      const id=cardId(d,i);
      if(!S.cards[id]) S.cards[id]={ef:2.5,iv:0,reps:0,due:today(),d,i};
    });
  }
  save();
}
function dueCards(){
  const t=today();
  return Object.values(S.cards).filter(c=>c.due<=t).sort((a,b)=>a.due<b.due?-1:1);
}
function schedule(c,quality){ // quality: 0 again,1 good,2 easy
  if(quality===0){c.reps=0;c.iv=0;c.ef=Math.max(1.3,c.ef-0.2);c.due=today();return 0;}
  if(c.reps===0)c.iv=quality===2?4:1;
  else if(c.reps===1)c.iv=quality===2?7:3;
  else c.iv=Math.round(c.iv*c.ef*(quality===2?1.3:1));
  c.reps++;
  c.ef=Math.max(1.3,c.ef+(quality===2?0.15:0));
  const dt=new Date();dt.setDate(dt.getDate()+c.iv);
  c.due=dt.toISOString().slice(0,10);
  return c.iv;
}
function previewIv(c,quality){
  const t={...c};return schedule(t,quality);
}

/* ---------- RENDER ---------- */
function renderTrack(){
  const el=document.getElementById('track');el.innerHTML='';
  for(let i=1;i<=90;i++){
    const d=document.createElement('div');d.className='tick';
    if(S.done.includes(i))d.classList.add('done');
    if(i===S.currentDay)d.classList.add('today');
    el.appendChild(d);
  }
  document.getElementById('dayNow').textContent='Bugün: Gün '+S.currentDay;
  document.getElementById('streak').textContent='🔥 '+S.streak;
}

function renderToday(){
  const day=S.currentDay;
  const w=WEEKLY[(day-1)%7];
  document.getElementById('todayWeekday').textContent='GÜN '+day+' · '+w.label;
  document.getElementById('todayTitle').textContent='Bugünün planı';
  document.getElementById('todaySub').textContent=w.focus;
  const due=dueCards().length;
  const hasContent=!!CURRICULUM[day];
  const gramTitle=hasContent?CURRICULUM[day].grammar.title:'(bu gün için içerik henüz eklenmedi)';
  const rows=[
    {ic:'▤',t:'Aralıklı tekrar',d:'Vadesi gelen kartları çöz',meta:due+' kart',v:'cards'},
    {ic:'✎',t:'Gramer + Feynman',d:gramTitle,meta:S.gramDone.includes(day)?'✓':'→',v:'gram'},
    {ic:'?',t:'Aktif hatırlama',d:'Günün quizini kapalı kitap çöz',meta:S.quizDone[day]!=null?S.quizDone[day]+' ✓':'→',v:'quiz'},
    {ic:'♫',t:'Dinleme · Diyalog',d:'Bugünün diyaloğunu dinle, Türkçesine bak',meta:'→',v:'listen'}
  ];
  document.getElementById('plan').innerHTML=rows.map(r=>
    `<div class="planrow" ${r.v?`data-go="${r.v}" style="cursor:pointer"`:''}>
      <div class="dot">${r.ic}</div>
      <div><div class="t">${r.t}</div><div class="d">${r.d}</div></div>
      <div class="meta">${r.meta}</div>
    </div>`).join('');
  document.querySelectorAll('[data-go]').forEach(el=>el.onclick=()=>switchView(el.dataset.go));
  const isDone=S.done.includes(day);
  const btn=document.getElementById('completeDay');
  btn.textContent=isDone?'Sonraki güne geç →':'Günü tamamla ✓';
  document.getElementById('completeNote').textContent=isDone
    ?'Gün '+day+' tamamlandı. Hazır olunca devam et.'
    :'Tekrar + gramer + quiz bitince işaretle.';
}

let session=[];
let cardMode='review';
function introCount(){ let n=0; for(let d=1;d<=S.currentDay;d++){ if(CURRICULUM[d])n+=CURRICULUM[d].vocab.length; } return n; }
function renderCards(){
  ensureCards();
  const area=document.getElementById('cardArea');
  const dueN=dueCards().length;
  area.innerHTML=`
    <div class="seg">
      <button class="segbtn ${cardMode==='review'?'on':''}" data-m="review">Tekrar${dueN?' · '+dueN:''}</button>
      <button class="segbtn ${cardMode==='list'?'on':''}" data-m="list">Tüm kelimeler · ${introCount()}</button>
    </div>
    <div id="cardBody"></div>`;
  area.querySelectorAll('.segbtn').forEach(b=>b.onclick=()=>{cardMode=b.dataset.m;if(cardMode==='review')session=[];playSound('tap');renderCards();});
  updateBadge();
  if(cardMode==='list'){ renderWordList(); return; }
  renderReview();
}
function renderReview(){
  const body=document.getElementById('cardBody');
  if(session.length===0)session=dueCards();
  if(session.length===0){
    body.innerHTML=`<div class="empty"><div class="big">✓</div>
      <p>Bugünlük tekrar bitti.</p>
      <p class="sub" style="margin-top:6px">Tüm kelimeleri görmek için yukarıdan “Tüm kelimeler”e geç.</p></div>`;
    return;
  }
  const c=session[0];
  const v=CURRICULUM[c.d].vocab[c.i];
  body.innerHTML=`
    <p class="qprog" style="margin:14px 0 10px">Kalan: ${session.length} · Gün ${c.d} kelimesi</p>
    <div class="card fc tap" id="fcard">
      <div class="art">${v.art||'—'}</div>
      <div class="de">${v.de}</div>
      <div class="tap-hint">çevirmek için dokun</div>
    </div>`;
  document.getElementById('fcard').onclick=()=>flip(c,v);
}
function renderWordList(){
  const body=document.getElementById('cardBody');
  let html='';
  for(let d=1;d<=S.currentDay;d++){
    if(!CURRICULUM[d])continue;
    html+=`<div class="wlday">Gün ${d}</div>`;
    CURRICULUM[d].vocab.forEach((v,i)=>{
      const card=S.cards[d+'-'+i];
      const seen=card&&card.reps>0;
      html+=`<div class="wlrow">
        <div class="wlde">${v.art?`<span class="wlart">${v.art}</span> `:''}${v.de}</div>
        <div class="wltr">${v.tr}</div>
        <span class="wlok">${seen?'✓':''}</span>
      </div>`;
    });
  }
  body.innerHTML=`<p class="sub" style="margin:12px 0 4px">Bugüne kadar tanıştığın tüm kelimeler. ✓ = en az bir kez çalıştın.</p>`+html;
}
function flip(c,v){
  playSound('flip');
  const area=document.getElementById('cardBody');
  area.innerHTML=`
    <p class="qprog" style="margin:14px 0 10px">Kalan: ${session.length} · Gün ${c.d} kelimesi</p>
    <div class="card fc">
      <div class="art">${v.art||'—'} ${v.de}</div>
      <div class="tr">${v.tr}</div>
      <div class="ex">“${v.ex}”</div>
      <div class="extr">${v.extr}</div>
    </div>
    <div class="rate">
      <button class="btn r-again">Zor<span class="iv">baştan</span></button>
      <button class="btn r-good">Orta<span class="iv">${previewIv(c,1)} gün</span></button>
      <button class="btn r-easy">Kolay<span class="iv">${previewIv(c,2)} gün</span></button>
    </div>`;
  area.querySelector('.r-again').onclick=()=>rate(c,0);
  area.querySelector('.r-good').onclick=()=>rate(c,1);
  area.querySelector('.r-easy').onclick=()=>rate(c,2);
}
function rate(c,q){
  schedule(c,q);
  bumpStreak();
  session.shift();
  if(q===0)session.push(c); // tekrar kuyruğun sonuna
  save();
  if(session.length===0)playSound('session');else playSound('tap');
  renderCards();renderTrack();updateBadge();
}

let gramOpen=null;
function renderGram(){
  const area=document.getElementById('gramArea');
  if(gramOpen && CURRICULUM[gramOpen]){ renderGramDetail(area,gramOpen); return; }
  gramOpen=null;
  document.getElementById('gramDay').textContent='Gramer';
  const days=Object.keys(CURRICULUM).map(Number).filter(d=>d<=S.currentDay).sort((a,b)=>a-b);
  if(days.length===0){area.innerHTML='<div class="empty">Henüz konu eklenmedi.</div>';return;}
  area.innerHTML='<p class="sub" style="margin:6px 0 16px">Konuya dokun, aç ve Feynman ile sesli anlat. Bitirince ✓ işaretle.</p>'+
    days.map(d=>{
      const g=CURRICULUM[d].grammar; const done=S.gramDone.includes(d);
      return `<div class="card tap topicrow" data-d="${d}">
        <span class="num">GÜN ${d}</span>
        <span class="ttl">${g.title}</span>
        <span class="mk ${done?'done':''}">${done?'✓':'›'}</span>
      </div>`;
    }).join('');
  area.querySelectorAll('.topicrow').forEach(el=>el.onclick=()=>{gramOpen=+el.dataset.d;playSound('tap');renderGram();window.scrollTo(0,0);});
}
function renderGramDetail(area,day){
  const g=CURRICULUM[day].grammar; const done=S.gramDone.includes(day);
  document.getElementById('gramDay').textContent='Gün '+day;
  area.innerHTML=`
    <button class="backbtn" id="gramBack">‹ Konular</button>
    <div class="card lesson"><h2 style="margin-top:0">${g.title}</h2>${g.html}</div>
    <div class="feyn">
      <div class="lbl">Feynman — sesli anlat, takıldığın yer boşluğun</div>
      <ul>${g.feynman.map(f=>`<li>${f}</li>`).join('')}</ul>
    </div>
    <button class="btn ${done?'btn-ghost':'btn-mint'}" id="gramBtn" style="margin-top:14px">
      ${done?'Anlattım ✓':'Hepsini sesli anlattım'}</button>`;
  document.getElementById('gramBack').onclick=()=>{gramOpen=null;renderGram();window.scrollTo(0,0);};
  document.getElementById('gramBtn').onclick=()=>{
    if(!S.gramDone.includes(day)){S.gramDone.push(day);playSound('complete');}
    bumpStreak();save();toast('Feynman tamam 🧠');renderGram();renderToday();
  };
}

let qState=null;
function renderQuiz(){
  const day=S.currentDay;const area=document.getElementById('quizArea');
  if(!CURRICULUM[day]){area.innerHTML='<div class="empty">Bu gün için quiz henüz eklenmedi.</div>';return;}
  if(!qState||qState.day!==day)qState={day,i:0,correct:0,answered:false};
  const quiz=CURRICULUM[day].quiz;
  if(qState.i>=quiz.length){
    if(!qState.scored){ S.quizDone[day]=qState.correct+'/'+quiz.length;bumpStreak();save();renderTrack();renderToday();playSound(qState.correct===quiz.length?'streak':'complete'); qState.scored=true; }
    area.innerHTML=`<div class="scorebox"><div class="n">${qState.correct}/${quiz.length}</div>
      <p class="sub" style="margin-top:8px">${qState.correct===quiz.length?'Kusursuz. Sıfır hata.':'Yanlışları kartlara dönüştür, yarın tekrar gelir.'}</p>
      <button class="btn btn-ghost" id="qre" style="margin-top:18px">Tekrar çöz</button></div>`;
    document.getElementById('qre').onclick=()=>{qState=null;renderQuiz();};
    return;
  }
  const item=quiz[qState.i];
  area.innerHTML=`
    <p class="qprog">Soru ${qState.i+1} / ${quiz.length} · doğru: ${qState.correct}</p>
    <div class="card"><div class="q">${item.q}</div>
      ${item.opts.map((o,k)=>`<button class="opt" data-k="${k}">${o}</button>`).join('')}
    </div>`;
  area.querySelectorAll('.opt').forEach(b=>b.onclick=()=>answerQuiz(b,item));
}
function answerQuiz(btn,item){
  if(qState.answered)return;qState.answered=true;
  const k=+btn.dataset.k;const opts=document.querySelectorAll('.opt');
  opts.forEach((o,idx)=>{o.disabled=true;if(idx===item.a)o.classList.add('correct');});
  if(k===item.a){qState.correct++;playSound('correct');}else{btn.classList.add('wrong');playSound('wrong');}
  setTimeout(()=>{qState.i++;qState.answered=false;renderQuiz();},850);
}

function renderProg(){
  ensureCards();
  const learned=Object.values(S.cards).filter(c=>c.reps>0).length;
  const total=Object.keys(S.cards).length;
  const due=dueCards().length;
  document.getElementById('statsArea').innerHTML=`
    <div class="stat"><div class="n">${S.currentDay}</div><div class="l">Aktif gün / 90</div></div>
    <div class="stat"><div class="n">${S.done.length}</div><div class="l">Tamamlanan gün</div></div>
    <div class="stat"><div class="n">${learned}</div><div class="l">Öğrenilen kart</div></div>
    <div class="stat"><div class="n">${S.streak}</div><div class="l">Gün serisi 🔥</div></div>`;
  // forecast next 7 days
  const fc={};
  for(let i=0;i<7;i++){const dt=new Date();dt.setDate(dt.getDate()+i);fc[dt.toISOString().slice(0,10)]=0;}
  Object.values(S.cards).forEach(c=>{if(fc[c.due]!==undefined)fc[c.due]++; else if(c.due<today())fc[today()]=(fc[today()]||0)+1;});
  const max=Math.max(1,...Object.values(fc));
  document.getElementById('forecast').innerHTML=Object.entries(fc).map(([d,n],idx)=>{
    const lbl=idx===0?'Bugün':new Date(d).toLocaleDateString('tr-TR',{weekday:'short'});
    return `<div style="display:flex;align-items:center;gap:10px;margin:7px 0">
      <span style="width:48px;font-family:var(--mono);font-size:12px;color:var(--muted)">${lbl}</span>
      <div style="flex:1;background:var(--surface2);border-radius:4px;height:18px;overflow:hidden">
        <div style="width:${(n/max)*100}%;height:100%;background:var(--mint)"></div></div>
      <span style="font-family:var(--mono);font-size:12px;width:24px;text-align:right">${n}</span></div>`;
  }).join('');
}

function updateBadge(){
  const n=dueCards().length;const b=document.getElementById('navBadge');
  b.className=n>0?'badge':'';b.textContent=n>0?n:'';
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600);}

let _dlg=null;
function renderListen(){
  const area=document.getElementById('listenArea');
  const day=S.currentDay;
  const L=CURRICULUM[day]&&CURRICULUM[day].listen;
  document.getElementById('listenTitle').textContent='Dinleme — Gün '+day;
  if(!L){ area.innerHTML='<div class="empty">Bu gün için dinleme henüz eklenmedi.</div>'; return; }
  area.innerHTML=`
    <p class="sub" style="margin:6px 0 4px">Önce sadece dinle. Sonra baloncuğa dokunup Türkçesini gör. En son sesle birlikte tekrarla (shadowing).</p>
    <div class="player">
      <button class="playbtn" id="pbtn" aria-label="Oynat veya duraklat">▶</button>
      <div class="ptrack" id="ptrack"><div class="pfill" id="pfill"></div></div>
      <span class="ptime" id="ptime">0:00</span>
    </div>
    <div class="chat">
      ${L.lines.map((l,i)=>`<div class="brow ${l.who==='Tahir'?'me':'them'}">
        <div class="bub" data-i="${i}"><span class="who">${l.who}</span>${l.de}<span class="taphint">dokun → Türkçe</span></div>
      </div>`).join('')}
    </div>`;
  area.querySelectorAll('.bub[data-i]').forEach(b=>b.onclick=()=>{
    const row=b.parentElement; const i=+b.dataset.i;
    const ex=row.querySelector('.btr');
    if(ex){ ex.remove(); }
    else { const tr=document.createElement('div'); tr.className='btr'; tr.textContent=L.lines[i].tr; row.appendChild(tr); playSound('tap'); }
  });
  setupPlayer(L);
}
function setupPlayer(L){
  if(_dlg){try{_dlg.pause();}catch(e){}}
  if(!L._url)L._url=dataURItoBlobURL(L.audio);
  _dlg=new Audio(L._url);
  const pbtn=document.getElementById('pbtn'),fill=document.getElementById('pfill'),time=document.getElementById('ptime'),track=document.getElementById('ptrack');
  const fmt=s=>{s=Math.floor(s||0);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');};
  pbtn.onclick=()=>{ if(_dlg.paused){const p=_dlg.play();if(p)p.catch(()=>{});pbtn.textContent='❚❚';}else{_dlg.pause();pbtn.textContent='▶';} };
  _dlg.ontimeupdate=()=>{ const pr=_dlg.duration?(_dlg.currentTime/_dlg.duration):0; fill.style.width=(pr*100)+'%'; time.textContent=fmt(_dlg.currentTime); };
  _dlg.onended=()=>{ pbtn.textContent='▶'; };
  track.onclick=e=>{ const r=track.getBoundingClientRect(); const pr=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width)); if(_dlg.duration)_dlg.currentTime=pr*_dlg.duration; };
}

/* ---------- NAV ---------- */
function switchView(v){
  if(_dlg){try{_dlg.pause();}catch(e){}}
  document.querySelectorAll('.view').forEach(s=>s.classList.remove('active'));
  document.getElementById('v-'+v).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.v===v));
  window.scrollTo(0,0);
  if(v==='today')renderToday();
  if(v==='cards'){session=[];renderCards();}
  if(v==='gram'){gramOpen=null;renderGram();}
  if(v==='listen')renderListen();
  if(v==='quiz')renderQuiz();
  if(v==='prog')renderProg();
}
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>switchView(b.dataset.v));

document.getElementById('completeDay').onclick=()=>{
  const day=S.currentDay;
  if(!S.done.includes(day)){
    S.done.push(day);bumpStreak();save();renderTrack();renderToday();playSound('complete');toast('Gün '+day+' tamamlandı ✓');
  }else{
    if(S.currentDay<90){S.currentDay++;ensureCards();save();renderTrack();renderToday();playSound('streak');toast('Gün '+S.currentDay+' açıldı');switchView('today');}
    else toast('90 gün bitti! 🎉');
  }
};
document.getElementById('resetBtn').onclick=()=>{
  if(confirm('Tüm ilerleme silinsin mi? Bu geri alınamaz.')){localStorage.removeItem(KEY);load();ensureCards();renderTrack();switchView('today');}
};
document.getElementById('muteBtn').onclick=()=>{S.muted=!S.muted;save();renderMute();if(!S.muted)playSound('tap');};

/* ---------- INIT ---------- */
load();ensureCards();renderTrack();renderToday();updateBadge();renderMute();
</script>
</body>
</html>
